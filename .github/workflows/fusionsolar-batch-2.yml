name: FusionSolar Live — Batch 2 (plant 5)

on:
  schedule:
    # Runs at :04, :19, :34, :49 every hour (4-minute stagger after batch 0)
    - cron: "4,19,34,49 * * * *"
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: changa-dashboard/package-lock.json
      - run: npm ci
        working-directory: changa-dashboard
      - name: Fetch batch 2
        working-directory: changa-dashboard
        env:
          FUSIONSOLAR_USERNAME: ${{ secrets.FUSIONSOLAR_USERNAME }}
          FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/fusionsolar-cron.ts --batch 2
