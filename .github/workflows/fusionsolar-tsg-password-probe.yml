name: TSG FusionSolar Password Probe

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fusionsolar-tsg-password-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Pin Huawei FusionSolar host
        run: echo "119.8.160.213 intl.fusionsolar.huawei.com" | sudo tee -a /etc/hosts

      - name: Run redacted login-only probe
        env:
          TSG_FUSIONSOLAR_USERNAME: ${{ secrets.TSG_FUSIONSOLAR_USERNAME }}
          TSG_FUSIONSOLAR_SYSTEM_CODE: ${{ secrets.TSG_FUSIONSOLAR_SYSTEM_CODE }}
        run: |
          python3 - <<'PY'
          import http.cookiejar
          import json
          import os
          import ssl
          import urllib.error
          import urllib.request

          username = os.environ.get("TSG_FUSIONSOLAR_USERNAME", "")
          system_code = os.environ.get("TSG_FUSIONSOLAR_SYSTEM_CODE", "")
          if not username or not system_code:
              print("RESULT: MISSING_TEMPORARY_SECRETS")
              raise SystemExit(8)

          cookies = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(cookies),
              urllib.request.HTTPSHandler(context=ssl.create_default_context()),
          )
          request = urllib.request.Request(
              "https://intl.fusionsolar.huawei.com/thirdData/login",
              data=json.dumps({
                  "userName": username,
                  "systemCode": system_code,
              }).encode("utf-8"),
              headers={
                  "Accept": "application/json",
                  "Content-Type": "application/json",
                  "User-Agent": "TSG-FusionSolar-One-Time-Probe/1.0",
              },
              method="POST",
          )

          try:
              response = opener.open(request, timeout=30)
              status = response.status
              headers = response.headers
              body = response.read()
          except urllib.error.HTTPError as exc:
              status = exc.code
              headers = exc.headers
              body = exc.read()

          try:
              result = json.loads(body.decode("utf-8"))
          except (UnicodeDecodeError, json.JSONDecodeError):
              result = {}

          token = headers.get("XSRF-TOKEN")
          accepted = (
              result.get("success") is True
              and str(result.get("failCode")) == "0"
              and bool(token)
          )
          print("LOGIN_HTTP_STATUS:", status)
          print("HUAWEI_SUCCESS:", result.get("success"))
          print("HUAWEI_FAIL_CODE:", result.get("failCode"))
          print("HUAWEI_MESSAGE:", result.get("message"))
          print("TOKEN_RECEIVED:", bool(token))
          print("COOKIES_RECEIVED:", bool(list(cookies)))
          print("RESULT:", "LOGIN_ACCEPTED" if accepted else "LOGIN_NOT_ACCEPTED")
          raise SystemExit(0 if accepted else 2)
          PY
