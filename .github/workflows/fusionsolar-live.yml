name: FusionSolar Live Snapshot

# Live totals + health + today's generation curve + active alarms for the whole
# FusionSolar fleet. One batched sweep (~3-4 API calls total) regardless of size.
#
# Scheduling is driven by Supabase pg_cron, which calls this workflow via the
# GitHub API (workflow_dispatch) every 15 min during SA daylight. GitHub's own
# `schedule:` trigger is intentionally NOT used — it is best-effort and routinely
# fires late or skips, which is unacceptable for a near-live feel. pg_cron fires
# reliably. See the Supabase cron job `gh-trigger-fusionsolar-live`.

on:
  workflow_dispatch: {}

# Cancel an in-flight run if a new one starts — never overlap Huawei sessions.
concurrency:
  group: fusionsolar-live
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Add Huawei host entry (GitHub DNS blocks *.huawei.com)
        run: echo "119.8.160.213 intl.fusionsolar.huawei.com" | sudo tee -a /etc/hosts
      - run: npm ci
      - name: Fetch live snapshot
        env:
          FUSIONSOLAR_USERNAME: ${{ secrets.FUSIONSOLAR_USERNAME }}
          FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/fusionsolar-worker.ts --mode live
