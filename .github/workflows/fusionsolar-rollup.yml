name: FusionSolar Rollup

# Self-healing backfill of the hourly curve + daily totals for today AND
# yesterday. Repairs any gaps left by missed live runs and finalises yesterday's
# figure once the day has closed (FusionSolar daily counters reset at midnight
# SAST = 22:00 UTC).
#
# Runs twice a day:
#   13:40 UTC (~15:40 SAST) — mid-afternoon top-up while the sun is still up
#   22:40 UTC (~00:40 SAST) — after midnight SAST to lock in the finished day
# Times are UTC.

on:
  schedule:
    - cron: "40 13 * * *"
    - cron: "40 22 * * *"
  workflow_dispatch: {}

concurrency:
  group: fusionsolar-rollup
  cancel-in-progress: false

jobs:
  rollup:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Add Huawei host entry (GitHub DNS blocks *.huawei.com)
        run: echo "119.8.160.213 intl.fusionsolar.huawei.com" | sudo tee -a /etc/hosts
      - run: npm ci
      - name: Rollup today + yesterday
        env:
          FUSIONSOLAR_USERNAME: ${{ secrets.FUSIONSOLAR_USERNAME }}
          FUSIONSOLAR_PASSWORD: ${{ secrets.FUSIONSOLAR_PASSWORD }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/fusionsolar-worker.ts --mode rollup
