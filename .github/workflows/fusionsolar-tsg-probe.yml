name: TSG FusionSolar One-Time Probe

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fusionsolar-tsg-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Pin Huawei FusionSolar host
        run: echo "119.8.160.213 intl.fusionsolar.huawei.com" | sudo tee -a /etc/hosts

      - name: Run redacted Northbound probe
        env:
          TSG_FUSIONSOLAR_USERNAME: ${{ secrets.TSG_FUSIONSOLAR_USERNAME }}
          TSG_FUSIONSOLAR_SYSTEM_CODE: ${{ secrets.TSG_FUSIONSOLAR_SYSTEM_CODE }}
        run: |
          python3 - <<'PY'
          import http.cookiejar
          import json
          import os
          import ssl
          import urllib.error
          import urllib.request

          base_url = "https://intl.fusionsolar.huawei.com/thirdData"
          username = os.environ.get("TSG_FUSIONSOLAR_USERNAME", "")
          system_code = os.environ.get("TSG_FUSIONSOLAR_SYSTEM_CODE", "")
          if not username or not system_code:
              print("PROBE_CONFIGURATION: missing isolated TSG secrets")
              raise SystemExit(8)

          cookie_jar = http.cookiejar.CookieJar()
          opener = urllib.request.build_opener(
              urllib.request.HTTPCookieProcessor(cookie_jar),
              urllib.request.HTTPSHandler(context=ssl.create_default_context()),
          )

          def post(path, payload, token=None):
              headers = {
                  "Accept": "application/json",
                  "Content-Type": "application/json",
                  "User-Agent": "FusionSolar-TSG-One-Time-Probe/1.0",
              }
              if token:
                  headers["XSRF-TOKEN"] = token
              request = urllib.request.Request(
                  base_url + path,
                  data=json.dumps(payload).encode("utf-8"),
                  headers=headers,
                  method="POST",
              )
              try:
                  response = opener.open(request, timeout=30)
                  status = response.status
                  response_headers = response.headers
                  body = response.read()
              except urllib.error.HTTPError as exc:
                  status = exc.code
                  response_headers = exc.headers
                  body = exc.read()
              try:
                  parsed = json.loads(body.decode("utf-8"))
              except (UnicodeDecodeError, json.JSONDecodeError):
                  parsed = {}
              return status, response_headers, parsed

          status, headers, login = post(
              "/login",
              {"userName": username, "systemCode": system_code},
          )
          token = headers.get("XSRF-TOKEN") or headers.get("xsrf-token")
          print("LOGIN_HTTP_STATUS:", status)
          print("HUAWEI_SUCCESS:", login.get("success"))
          print("HUAWEI_FAIL_CODE:", login.get("failCode"))
          print("HUAWEI_MESSAGE:", login.get("message"))
          print("TOKEN_RECEIVED:", bool(token))
          print("COOKIES_RECEIVED:", bool(list(cookie_jar)))

          if login.get("failCode") in (407, 429):
              print("RESULT: RATE_LIMITED")
              raise SystemExit(5)
          if login.get("success") is not True or str(login.get("failCode")) != "0" or not token:
              print("RESULT: LOGIN_NOT_ACCEPTED")
              raise SystemExit(2)

          station_status, _, stations = post(
              "/getStationList",
              {"pageNo": 1, "pageSize": 100},
              token=token,
          )
          data = stations.get("data")
          if isinstance(data, dict):
              records = data.get("list") or data.get("records") or []
          elif isinstance(data, list):
              records = data
          else:
              records = []

          print("STATIONS_HTTP_STATUS:", station_status)
          print("STATIONS_SUCCESS:", stations.get("success"))
          print("STATIONS_FAIL_CODE:", stations.get("failCode"))
          print("PLANT_COUNT:", len(records))
          if records:
              print("RESULT: AUTHENTICATION_AND_PLANT_ACCESS_VALID")
          else:
              print("RESULT: AUTHENTICATION_VALID_PLANT_ACCESS_EMPTY_OR_DENIED")
          PY
